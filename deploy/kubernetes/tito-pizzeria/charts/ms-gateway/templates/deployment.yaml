{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tito-ms-gateway-deployment
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tito-ms-gateway
  template:
    metadata:
      labels:
        app: tito-ms-gateway
    spec:
      containers:
        - name: {{ include "ms-gateway.fullname" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          env:
            # ... otras variables que ya tengas ...
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ms-gateway.fullname" . }}-config
                  key: PORT
            - name: NATS_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ms-gateway.fullname" . }}-config
                  key: NATS_SERVERS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-token-secret
                  key: JWT_SECRET
          ports:
            - containerPort: {{ .Values.app.containerPort }}
          envFrom:
            - configMapRef:
                name: tito-ms-gateway-config
{{- end }}
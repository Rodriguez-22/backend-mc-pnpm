{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tito-ms-gateway-deployment
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tito-ms-gateway
  template:
    metadata:
      labels:
        app: tito-ms-gateway
    spec:
      containers:
        - name: tito-ms-gateway
          # 👇 Usamos latest para que siempre pille lo que acaba de subir Jenkins
          image: "jose196/tito-gateway:latest" 
          imagePullPolicy: Always
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          env:
            - name: MICROSERVICIO
              value: "ms-client-gateway"
            # 👇 CORREGIDO: Apuntando al namespace tito-pizzeria donde está tu NATS
            - name: NATS_SERVERS
              value: "nats://nats.tito-pizzeria.svc.cluster.local:4222"
            - name: PORT
              value: {{ .Values.app.containerPort | quote }}
          ports:
            - containerPort: {{ .Values.app.containerPort }}
          envFrom:
            - configMapRef:
                name: tito-ms-gateway-config
{{- end }}
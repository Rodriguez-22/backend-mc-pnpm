{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tito-ms-usuarios-deployment
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.app.container.replicas }}
  selector:
    matchLabels:
      app: tito-ms-usuarios
  template:
    metadata:
      labels:
        app: tito-ms-usuarios
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret-postgres.yaml") . | sha256sum }}
    spec:
      containers:
        - name: {{ include "ms-usuarios.fullname" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: MICROSERVICIO
              value: "ms-usuarios"
            - name: DATABASE_URL
              value: "postgresql://admin:$(DATABASE_PASSWORD)@{{ include "ms-usuarios.fullname" . }}-postgres:5432/bdusuarios?schema=public"
            # --- ESTAS SON LAS QUE ESTABAN MAL PEGADAS ---
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ms-usuarios.fullname" . }}-config
                  key: PORT
            - name: NATS_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "ms-usuarios.fullname" . }}-config
                  key: NATS_SERVERS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-token-secret
                  key: JWT_SECRET
          envFrom:
            - configMapRef:
                name: tito-ms-usuarios-config
          # ✅ AQUÍ NO DEBE HABER NADA DE volumeMounts
      # ✅ AQUÍ NO DEBE HABER NADA DE volumes
{{- end }}
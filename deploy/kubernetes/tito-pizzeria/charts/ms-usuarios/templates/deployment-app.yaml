{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tito-ms-usuarios-deployment
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.app.container.replicas }}
  selector:
    matchLabels:
      app: tito-ms-usuarios
  template:
    metadata:
      labels:
        app: tito-ms-usuarios
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret-postgres.yaml") . | sha256sum }}
    spec:
      containers:
        - name: tito-ms-usuarios
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy | default "Always" }}
          ports:
            - containerPort: {{ .Values.app.containerPort }}
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: {{ include "ms-usuarios.fullname" . }}-config
              key: PORT
        - name: NATS_SERVERS
          valueFrom:
            configMapKeyRef:
              name: {{ include "ms-usuarios.fullname" . }}-config
              key: NATS_SERVERS
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-token-secret
              key: JWT_SECRET
          envFrom:
            - configMapRef:
                name: tito-ms-usuarios-config
          # ✅ AQUÍ NO DEBE HABER NADA DE volumeMounts
      # ✅ AQUÍ NO DEBE HABER NADA DE volumes
{{- end }}